name: Deploy Fetique site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify production build
        shell: bash
        run: |
          grep -q './assets/' dist/index.html
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "ERROR: dist/index.html still references dev entry — build failed"
            exit 1
          fi
          test -f dist/yandex_6ce789ef6c3d3a42.html || (echo "ERROR: Yandex verification file missing from dist" && exit 1)
          grep -q 'Verification: 6ce789ef6c3d3a42' dist/yandex_6ce789ef6c3d3a42.html

      - name: Deploy built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
